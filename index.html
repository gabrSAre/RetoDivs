<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETO DIV</title>
    <style>
        body{
            background-color: rgb(104, 104, 205);
        }

        .container{
            width: 80%;
            height: 1000px;
            background-color: rgb(199, 195, 195);
            margin: auto;
        }

        header{
            width: 100%;
            height:150px ;

            font-family: Georgia, 'Times New Roman', Times, serif;

        }

        .imagen{
            width: 100%;
            height: 200px;
            background-image: url("img/logo.png");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        
        }

        .color{
            width:100%;
            height:200px;
            background-color: rgb(34, 174, 230);
        }

        footer{
            width: 100%;
            height: 150px;
            background-color: black;
            font-size: 20px;
            font-family: Georgia, 'Times New Roman', Times, serif;
            color: white;
        }

        footer p{
            margin:0px auto;
            padding-top: 70px;
            text-align: center;
        }


    </style>
</head>

    <div class="container">

            <img src="img/logo.png" alt="Logo de div">

        <nav>

</html>
